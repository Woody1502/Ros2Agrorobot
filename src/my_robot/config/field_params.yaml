/**:
  ros__parameters:

    # ── Геометрия поля (garden_rows_world.sdf) ──────────────────────────────
    # 5 рядов, y = {-4, -2, 0, 2, 4}, длина ряда 29 м (центр x=0)
    num_rows:     5
    row_spacing:  2.0     # м между центрами соседних рядов
    row_length:   5.0     # ТЕСТ: короткий ряд (боевой: 26.5)
    end_margin:   3.0     # м до конца ряда — начинаем тормозить

    # ── Headland разворот ────────────────────────────────────────────────────
    headland_depth: 9.0   # м в headland перед поворотом (> r_min=6.82 м)

    # ── Таймауты ─────────────────────────────────────────────────────────────
    row_entry_timeout: 8.0   # сек ожидания захвата VS при входе в ряд

    # ── Скорости (рад/с на колёсах, радиус 0.37 м → ≈ 0.37 м/с на 1 рад/с) ─
    nav_speed:   1.0    # в headland (прямо)
    turn_speed:  0.6    # во время поворота 90°
    entry_speed: 0.5    # при входе в ряд (медленно для VS)
    goto_speed:  0.8    # тестовый GOTO режим

    # ── Рулевое управление ───────────────────────────────────────────────────
    max_steer: 0.28          # рад (чуть меньше механического предела 0.3)
    goto_steer_gain: 1.0     # усиление пропорционального регулятора в GOTO
    goto_tolerance: 0.5      # м — считаем точку достигнутой

    # steer_sign_flip: знак команды руля
    #   +1 = без инверсии (acker_odom: positive steer → right turn)
    #   -1 = инвертировать (если робот едет не в ту сторону при развороте)
    # ПРОВЕРИТЬ ТЕСТОМ:
    #   ros2 topic pub --once /position_controller/commands \
    #       std_msgs/Float64MultiArray "{data: [0.3]}"
    #   Если в симуляции робот повернул ВЛЕВО (к +y), поменяй на -1
    steer_sign_flip: 1
